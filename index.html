<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王渼荃 | 影视导演 & AI影像探索者</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 1. 设计系统：全新浅色薄荷绿主题 --- */
        :root {
            --bg-color: #A7CCC9;        /* MINT: 背景色 */
            --text-color: #4D1308;      /* CHAIR: 主要文字颜色，确保对比度 */
            --heading-color: #D06E89;   /* ROSE: 姓名等主标题颜色 */
            --subtitle-color: #A27764;  /* COCO: 副标题颜色 */
            --primary-color: #E6B2BE;   /* MILKSHAKE: 主按钮、高光颜色 */
            --light-text-color: #F5F0ED;/* 用于深色背景上的文字（如按钮内） */
            
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Noto Sans SC', sans-serif;
        }
        
        /* --- 2. 基础与布局 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.5s ease;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 40px; }

        /* --- 3. 导航栏 (Navbar) --- */
        .navbar {
            padding: 30px 0;
            position: absolute;
            width: 100%;
            z-index: 100;
        }
        .navbar .container { display: flex; justify-content: space-between; align-items: center; }
        .nav-logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-color); /* 在浅色背景下，Logo使用深色文字 */
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .nav-logo:hover { color: var(--heading-color); }
        .nav-links { list-style: none; display: flex; align-items: center; }
        .nav-links li { margin-left: 35px; }
        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .nav-links a:hover { color: var(--heading-color); }
        
        /* --- 4. 按钮样式 (重新设计以适应浅色背景) --- */
        .btn {
            display: inline-block;
            background: var(--primary-color); /* Milkshake Pink */
            color: var(--text-color); /* Chair Brown Text */
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            border: 2px solid var(--primary-color);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            background: #e9a5b4; /* 悬停时加深一点点 */
        }
        .btn-secondary {
            background: transparent;
            color: var(--heading-color); /* Rose color */
            border-color: var(--heading-color);
            box-shadow: none;
        }
        .btn-secondary:hover {
            background: var(--heading-color);
            color: var(--light-text-color); /* 变为浅色文字 */
            box-shadow: 0 4px 15px rgba(208, 110, 137, 0.3);
        }

        /* --- 5. 英雄区 (Hero Section) --- */
        #home {
            height: 100vh;
            min-height: 700px;
            display: flex;
            align-items: center;
        }
        .hero-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            align-items: center;
            gap: 60px;
        }
        .hero-text h1 {
            font-family: var(--font-heading);
            font-size: 64px;
            font-weight: 700;
            color: var(--heading-color); /* Rose Pink for the name */
            line-height: 1.2;
            margin: 10px 0;
        }
        .hero-text .subtitle {
            font-size: 28px;
            color: var(--subtitle-color); /* Coco Brown for subtitle */
            font-weight: 500;
            height: 40px;
        }
        .hero-text p {
            font-size: 16px;
            color: var(--text-color);
            opacity: 0.8;
            max-width: 450px;
            margin: 20px 0 30px;
        }
        .hero-actions { display: flex; gap: 15px; }
        .hero-image-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .hero-image-wrapper .background-shape {
            /* 移除背景形状，让图片更纯粹地展示 */
        }
        .hero-image-wrapper img {
            width: 100%;
            height: auto;
            max-width: 400px;
            object-fit: cover;
            border-radius: 16px; /* 给图片本身加一点圆角 */
            box-shadow: 0 10px 40px rgba(77, 19, 8, 0.2); /* 使用Chair Brown作为阴影色 */
        }

        /* --- 动态打字效果 --- */
        .typing-cursor {
            display: inline-block;
            width: 3px;
            height: 28px;
            background-color: var(--subtitle-color); /* 匹配副标题颜色 */
            animation: blink 1s infinite;
            margin-left: 5px;
            vertical-align: middle;
        }
        @keyframes blink { 50% { opacity: 0; } }
        
        /* --- 后续部分占位 --- */
        section { padding: 100px 0; }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="#home" class="nav-logo">WMQ</a>
            <ul class="nav-links">
                <li><a href="#portfolio">作品集</a></li>
                <li><a href="#about">关于我</a></li>
                <li><a href="#contact">联系我</a></li>
            </ul>
        </div>
    </nav>

    <!-- 首页 / 英雄区 -->
    <section id="home">
        <div class="container hero-container">
            <!-- 左侧内容 -->
            <div class="hero-text">
                <p>你好，我是</p>
                <h1>王渼荃</h1>
                <div class="subtitle">
                    <span id="typing-text"></span>
                    <span class="typing-cursor"></span>
                </div>
                <p>以镜头为笔，以AI为墨，在光影中构建叙事，在算法中探索美学。致力于创作触动人心、超越想象的视觉故事。</p>
                <div class="hero-actions">
                    <a href="#portfolio" class="btn">探索作品</a>
                    <a href="YOUR_CV_LINK.pdf" class="btn btn-secondary" target="_blank">下载简历</a>
                </div>
            </div>

            <!-- 右侧视觉 -->
            <div class="hero-image-wrapper">
                <div class="background-shape"></div>
                <!-- 
                    重要提示: 图片路径依然是 'assets/images/my-photo.png'
                    请确保您的GitHub仓库中有这个文件。
                -->
                <img src="assets/images/my-photo.png" alt="王渼荃的个人照片">
            </div>
        </div>
    </section>

    <!-- 占位符部分 -->
    <section id="portfolio" style="background-color: #bfe0de;">
        <div class="container">
            <h2 style="text-align: center; font-size: 40px; color: var(--text-color);">作品集 Section</h2>
        </div>
    </section>

    <script>
        // --- 动态打字效果脚本 (无需改动) ---
        document.addEventListener('DOMContentLoaded', function() {
            const typingTextElement = document.getElementById('typing-text');
            const roles = ['影视导演', 'AI影像探索者', '创意编剧'];
            let roleIndex = 0;
            let charIndex = 0;
            let isDeleting = false;

            function type() {
                const currentRole = roles[roleIndex];
                let displayText = '';

                if (isDeleting) {
                    displayText = currentRole.substring(0, charIndex - 1);
                    charIndex--;
                } else {
                    displayText = currentRole.substring(0, charIndex + 1);
                    charIndex++;
                }

                typingTextElement.textContent = displayText;
                let typeSpeed = isDeleting ? 100 : 200;

                if (!isDeleting && charIndex === currentRole.length) {
                    typeSpeed = 2000;
                    isDeleting = true;
                } else if (isDeleting && charIndex === 0) {
                    isDeleting = false;
                    roleIndex = (roleIndex + 1) % roles.length;
                    typeSpeed = 500;
                }
                setTimeout(type, typeSpeed);
            }
            type();
        });
    </script>

</body>
</html>
