<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王渼荃 | 个人主页</title>
    <style>
        /* 导入谷歌字体 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap');

        /* 整体页面样式 */
        body {
            background-color: #f5f5dc; /* 米色背景 */
            color: #4a4a4a; /* 深灰色文字 */
            font-family: 'Noto Sans SC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* 主内容容器 */
        .container {
            max-width: 600px;
            width: 100%;
        }

        /* 导航栏样式 */
        .navbar {
            margin-bottom: 40px;
        }
        .navbar a {
            color: #4a4a4a;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            padding-bottom: 5px;
            border-bottom: 2px solid transparent; /* 透明下划线占位 */
            transition: border-color 0.3s;
        }
        .navbar a:hover, .navbar a.active {
            color: #8B4513; /* 悬停/激活时变为巧克力色 */
            border-bottom-color: #8B4513; /* 下划线变为巧克力色 */
        }

        /* 图片圆形容器 */
        .photo-container {
            width: 180px;
            height: 180px;
            background-color: #8B4513; /* 巧克力色 */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto; /* 居中并与下方元素保持距离 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* 头像图片样式 */
        .profile-photo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover; /* 确保图片不变形 */
        }

        /* 名字标题 */
        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        /* 动态打字效果的文本样式 */
        .subtitle {
            font-size: 1.5em;
            color: #8B4513; /* 巧克力色 */
            height: 40px; /* 固定高度防止跳动 */
            min-height: 1.5em;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <a href="index.html" class="active">首页</a>
            <a href="about.html">关于我</a>
            <a href="portfolio.html">作品集</a>
            <a href="contact.html">联系我</a>
        </nav>
        
        <!-- 圆形头像 -->
        <div class="photo-container">
            <img src="assets/images/my-photo.jpg" alt="我的照片" class="profile-photo">
        </div>
        
        <!-- 姓名和职位 -->
        <h1>王渼荃</h1>
        <div class="subtitle">
            <span id="typed-text"></span>
        </div>
    </div>

    <!-- 引入 Typed.js 库 -->
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script>
        // 初始化 Typed.js
        new Typed('#typed-text', {
          strings: ['UI/UX Designer', '前端开发者', '欢迎来到我的主页'],
          typeSpeed: 100,
          backSpeed: 50,
          loop: true
        });
    </script>
</body>
</html>
