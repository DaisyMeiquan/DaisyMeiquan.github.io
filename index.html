    /* --- 3. 导航栏 (Navbar) --- [重大修改] --- */
    .navbar {
        padding: 30px 0;
        position: fixed;
        width: 100%;
        z-index: 1000;
        background-color: transparent; /* 初始背景透明 */
        transition: background-color 0.4s ease, box-shadow 0.4s ease;
    }
    .navbar.scrolled {

        background-color: rgba(77, 19, 8, 0.85); /* var(--text-color) 的半透明版 */
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }
    .navbar .container { display: flex; justify-content: space-between; align-items: center; }
    
    .nav-logo {
        font-family: var(--font-heading);
        font-size: 24px;
        font-weight: 700;
        /* [修改] 文字颜色改为浅色，以便在巧克力背景上显示 */
        color: var(--light-text-color); 
        text-decoration: none;
        transition: color 0.3s ease;
    }
    
    .nav-links { list-style: none; display: flex; align-items: center; }
    .nav-links li { margin-left: 35px; }
    .nav-links a {
        /* [修改] 文字颜色改为浅色 */
        color: var(--light-text-color); 
        text-decoration: none;
        font-weight: 500;
        position: relative;
        padding-bottom: 5px;
        transition: color 0.3s ease;
    }

    /* [修改] 悬停颜色调整 */
    .nav-logo:hover,
    .nav-links a:hover {
        color: var(--primary-color); /* 悬停时变为更亮的奶昔粉色，对比更清晰 */
    }

    .nav-links a::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 2px;
        background-color: var(--primary-color); /* 下划线也用奶昔粉色 */
        transition: width 0.3s ease;
    }
    .nav-links a:hover::after { width: 100%; }
