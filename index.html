<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王渼荃 | 影视导演 & AI影像探索者</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 1. 设计系统：基于您提供的配色方案 --- */
        :root {
            --bg-color: #4D1308;        /* Chair: 背景色 */
            --primary-color: #E6B2BE;   /* Milkshake: 主高光色 (按钮, 姓名) */
            --secondary-color: #A7CCC9; /* Mint: 次高光色 (头衔, 图标) */
            --tertiary-color: #D06E89;  /* Rose: 点缀色1 */
            --quaternary-color: #A27764;/* Coco: 点缀色2 */
            --text-color: #F5F0ED;      /* 柔和的米白色，保证可读性 */
            --text-color-dark: #2c1d1a; /* 用于浅色背景上的文字 */

            --font-heading: 'Playfair Display', serif; /* 艺术感衬线字体用于大标题 */
            --font-body: 'Noto Sans SC', sans-serif;   /* 清晰的无衬线字体 */
        }
        
        /* --- 2. 基础与布局 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 40px; }

        /* --- 3. 导航栏 (Navbar) --- */
        .navbar {
            padding: 30px 0;
            position: absolute;
            width: 100%;
            z-index: 100;
        }
        .navbar .container { display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-size: 24px; font-weight: 700; color: var(--primary-color); text-decoration: none; }
        .nav-links { list-style: none; display: flex; align-items: center; }
        .nav-links li { margin-left: 35px; }
        .nav-links a { color: var(--text-color); text-decoration: none; font-weight: 500; transition: color 0.3s ease; }
        .nav-links a:hover { color: var(--primary-color); }
        .btn {
            display: inline-block;
            background: var(--primary-color);
            color: var(--text-color-dark);
            padding: 10px 25px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 700;
            border: 2px solid var(--primary-color);
            transition: all 0.3s ease;
        }
        .btn:hover { background: transparent; color: var(--primary-color); }
        .btn-secondary {
            background: transparent;
            color: var(--primary-color);
            border-color: var(--primary-color);
        }
        .btn-secondary:hover { background: var(--primary-color); color: var(--text-color-dark); }
        
        /* --- 4. 英雄区 (Hero Section) - 核心设计区域 --- */
        #home {
            height: 100vh;
            min-height: 700px;
            display: flex;
            align-items: center;
        }
        .hero-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr; /* 左侧内容区更宽 */
            align-items: center;
            gap: 60px;
        }
        .hero-text h1 {
            font-family: var(--font-heading);
            font-size: 64px;
            font-weight: 700;
            color: var(--primary-color);
            line-height: 1.2;
            margin: 10px 0;
        }
        .hero-text .subtitle {
            font-size: 28px;
            color: var(--secondary-color);
            font-weight: 500;
            height: 40px; /* 固定高度防止抖动 */
        }
        .hero-text p {
            font-size: 16px;
            color: rgba(245, 240, 237, 0.8);
            max-width: 450px;
            margin: 20px 0 30px;
        }
        .hero-actions { display: flex; gap: 15px; }
        .hero-image-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .hero-image-wrapper .background-shape {
            width: 100%;
            padding-bottom: 100%; /* 保持1:1的圆形 */
            background-color: var(--quaternary-color);
            border-radius: 50%;
            opacity: 0.3;
        }
        .hero-image-wrapper img {
            position: absolute;
            width: 90%;
            height: auto;
            max-width: 400px;
            object-fit: cover;
        }

        /* --- 动态打字效果 --- */
        .typing-cursor {
            display: inline-block;
            width: 3px;
            height: 28px;
            background-color: var(--secondary-color);
            animation: blink 1s infinite;
            margin-left: 5px;
            vertical-align: middle;
        }
        @keyframes blink { 50% { opacity: 0; } }
        
        /* --- 后续部分占位 --- */
        section { padding: 100px 0; }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="#home" class="nav-logo">WMQ</a>
            <ul class="nav-links">
                <li><a href="#portfolio">作品集</a></li>
                <li><a href="#about">关于我</a></li>
                <li><a href="#contact">联系我</a></li>
                <li><a href="#contact" class="btn">雇佣我</a></li>
            </ul>
        </div>
    </nav>

    <!-- 首页 / 英雄区 -->
    <section id="home">
        <div class="container hero-container">
            <!-- 左侧内容 -->
            <div class="hero-text">
                <p>你好，我是</p>
                <h1>王渼荃</h1>
                <div class="subtitle">
                    <span id="typing-text"></span>
                    <span class="typing-cursor"></span>
                </div>
                <p>以镜头为笔，以AI为墨，在光影中构建叙事，在算法中探索美学。致力于创作触动人心、超越想象的视觉故事。</p>
                <div class="hero-actions">
                    <a href="#portfolio" class="btn">探索作品</a>
                    <a href="YOUR_CV_LINK.pdf" class="btn btn-secondary" target="_blank">下载简历</a>
                </div>
            </div>

            <!-- 右侧视觉 -->
            <div class="hero-image-wrapper">
                <div class="background-shape"></div>
                <!-- 
                    重要提示: 
                    请准备一张背景透明的个人半身照 (PNG格式)，命名为'my-photo.png'
                    然后把它放在 'assets/images/' 文件夹下。
                -->
                <img src="assets/images/my-photo.png" alt="王渼荃的个人照片">
            </div>
        </div>
    </section>

    <!-- 作品集、关于我、联系方式等部分 -->
    <!-- (为了保持首页代码的清晰，这些部分可以先用占位符，后续再逐步添加) -->
    <section id="portfolio" style="background-color: #5a2015;">
        <div class="container">
            <h2 style="text-align: center; font-size: 40px; color: var(--primary-color);">作品集 Section</h2>
            <!-- 这里将放置您的作品集网格 -->
        </div>
    </section>

    <script>
        // --- 动态打字效果脚本 ---
        document.addEventListener('DOMContentLoaded', function() {
            const typingTextElement = document.getElementById('typing-text');
            const roles = ['影视导演', 'AI影像探索者', '创意编剧'];
            let roleIndex = 0;
            let charIndex = 0;
            let isDeleting = false;

            function type() {
                const currentRole = roles[roleIndex];
                let displayText = '';

                if (isDeleting) {
                    displayText = currentRole.substring(0, charIndex - 1);
                    charIndex--;
                } else {
                    displayText = currentRole.substring(0, charIndex + 1);
                    charIndex++;
                }

                typingTextElement.textContent = displayText;

                let typeSpeed = isDeleting ? 100 : 200;

                if (!isDeleting && charIndex === currentRole.length) {
                    typeSpeed = 2000; // 完成一个词后的停留时间
                    isDeleting = true;
                } else if (isDeleting && charIndex === 0) {
                    isDeleting = false;
                    roleIndex = (roleIndex + 1) % roles.length;
                    typeSpeed = 500; // 开始打新词前的延迟
                }

                setTimeout(type, typeSpeed);
            }

            type();
        });
    </script>

</body>
</html>
