        /* --- 1. 设计系统 (无变化) --- */
        :root {
            --bg-color: #A7CCC9;
            --bg-secondary-color: #bfe0de;
            --card-bg-color: #fdfbfb;
            --text-color: #4D1308;
            --heading-color: #D06E89;
            --subtitle-color: #A27764;
            --primary-color: #E6B2BE;
            --light-text-color: #F5F0ED;
            
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Noto Sans SC', sans-serif;

            --shadow-sm: 0 4px 15px rgba(77, 19, 8, 0.05);
            --shadow-md: 0 8px 30px rgba(77, 19, 8, 0.1);
        }

        /* --- 2. 基础与布局 (微调) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 40px; }
        section { padding: 120px 0; }
        
        /* 隐藏非首页的其他 section，直到首页动画或内容加载完毕 */
        body > section:not(#home) {
            opacity: 1; /* 正式版设为1 */
        }

        .section-title { text-align: center; margin-bottom: 60px; }
        .section-title h2 { font-family: var(--font-heading); font-size: 42px; color: var(--text-color); margin-bottom: 10px; }
        .section-title p { font-size: 16px; color: var(--subtitle-color); max-width: 500px; margin: 0 auto; }

        /* --- 3. 导航栏 (无变化) --- */
        .navbar {
            padding: 30px 0;
            position: fixed;
            width: 100%;
            z-index: 1000;
            background-color: transparent;
            transition: background-color 0.4s ease, box-shadow 0.4s ease;
        }
        .navbar.scrolled {
            background-color: rgba(77, 19, 8, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .navbar .container { display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-family: var(--font-heading); font-size: 24px; font-weight: 700; color: var(--light-text-color); text-decoration: none; transition: color 0.3s ease; }
        .nav-links { list-style: none; display: flex; align-items: center; }
        .nav-links li { margin-left: 35px; }
        .nav-links a { color: var(--light-text-color); text-decoration: none; font-weight: 500; position: relative; padding-bottom: 5px; transition: color 0.3s ease; }
