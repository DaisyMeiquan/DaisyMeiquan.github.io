<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王渼荃 | 个人主页</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap');

        body {
            background-color: #e0f2e9; /* 低饱和薄荷绿背景 */
            color: #333333; /* 深灰色文字 */
            font-family: 'Noto Sans SC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .navbar {
            margin-bottom: 40px;
        }
        .navbar a {
            color: #333333;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            padding-bottom: 5px;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        .navbar a:hover, .navbar a.active {
            color: #5a8f7b; /* 悬停/激活时变为深绿色 */
            border-bottom-color: #5a8f7b;
        }

        .photo-container {
            width: 180px;
            height: 180px;
            background-color: #5a8f7b; /* 深绿色圆形背景 */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .profile-photo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
        }

        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.5em;
            color: #5a8f7b; /* 深绿色动态文字 */
            height: 40px;
            min-height: 1.5em;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <a href="index.html" class="active">首页</a>
            <a href="about.html">关于我</a>
            <a href="portfolio.html">作品集</a>
            <a href="contact.html">联系我</a>
        </nav>
        
        <div class="photo-container">
            <img src="assets/images/my-photo.jpg" alt="我的照片" class="profile-photo">
        </div>
        
        <h1>王渼荃</h1>
        <div class="subtitle">
            <span id="typed-text"></span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script>
        new Typed('#typed-text', {
          strings: ['UI/UX Designer', '前端开发者', '欢迎来到我的主页'],
          typeSpeed: 100,
          backSpeed: 50,
          loop: true
        });
    </script>
</body>
</html>
